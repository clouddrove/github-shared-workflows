---
name: Release - Maintain Major Tag

on:
  workflow_call:
    inputs:
      tag_name:
        description: 'Tag name to update major version for'
        required: true
        type: string
    secrets:
      GITHUB:
        required: true

permissions:
  contents: write

jobs:
  update-major-tag:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB }}

      - name: Fetch tags
        run: git fetch --tags

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Extract major version
        id: version
        run: |
          TAG="${{ inputs.tag_name }}"
          MAJOR=$(echo "$TAG" | cut -d. -f1)
          MAJOR_TAG="$MAJOR"

          echo "Major tag: $MAJOR_TAG"
          echo "major_tag=$MAJOR_TAG" >> $GITHUB_OUTPUT

      - name: Update major tag
        run: |
          git tag -f ${{ steps.version.outputs.major_tag }} ${{ inputs.tag_name }}

      - name: Push major tag
        run: |
          git push origin ${{ steps.version.outputs.major_tag }} --force
...