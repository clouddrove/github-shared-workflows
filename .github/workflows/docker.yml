---
name: docker-build-push

on:
  workflow_call:
    inputs:
      provider:
        required: false
        type: string
      images:
        required: false
        type: string
      aws_region:
        required: false
        type: string
      ECR_REPOSITORY:
        required: false
        type: string
      IMAGE_TAG:
        required: false
        type: string
      BUILD_PATH:
        required: false
        type: string
      WORKING_DIRECTORY:
        required: false
        type: string 
      role_arn:
        required: false
        type: string  # Root role ARN to assume  
      assume_role_arn:
        required: false
        type: string  # ARN for the role to assume with STS
    secrets:
      AWS_ACCESS_KEY_ID:
        required: false
        description: 'AWS Access Key ID to install AWS CLI.'
      BUILD_ROLE:
        required: false
        description: 'AWS OIDC role for aws authentication.'
      AWS_SECRET_ACCESS_KEY:
        required: false
        description: 'AWS Secret access key to install AWS CLI'
      AWS_SESSION_TOKEN:
        required: false
        description: 'AWS Session Token to install AWS CLI' 
      DOCKERHUB_USERNAME:
        description: 'dockerhub username'
        required: false
      DOCKERHUB_PASSWORD:
        description: 'dockerhub password'
        required: false

jobs:
  build-image:
    name: Build Images
    runs-on: ubuntu-latest

    steps:

      - name: Checkout git repo
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        if: ${{ inputs.provider == 'DOCKERHUB' }}
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_PASSWORD }}

      - name: Push docker image to DOCKERHUB
        if: ${{ inputs.provider == 'DOCKERHUB' }}
        env:
          IMAGE_TAG: ${{ inputs.IMAGE_TAG }}
          images: ${{ inputs.images }}
          BUILD_PATH: ${{ inputs.BUILD_PATH }}
        run: |
          docker build -t $images:$IMAGE_TAG BUILD_PATH
          docker push $images:$IMAGE_TAG

      - name: Install AWS CLI
        if: ${{ inputs.provider == 'aws' }}
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          role-to-assume: ${{ secrets.BUILD_ROLE }}
          aws-region: ${{ inputs.aws_region }}
          role-duration-seconds: 900
          role-skip-session-tagging: true


      - name: Assume AWS Role
        if: ${{ inputs.provider == 'aws' }}
        id: assume-role
        run: |
          CREDENTIALS=$(aws sts assume-role --role-arn ${{ inputs.assume_role_arn }} --role-session-name local --query "Credentials.[AccessKeyId,SecretAccessKey,SessionToken]" --output text)
          export AWS_ACCESS_KEY_ID=$(echo $CREDENTIALS | awk '{print $1}')
          export AWS_SECRET_ACCESS_KEY=$(echo $CREDENTIALS | awk '{print $2}')
          export AWS_SESSION_TOKEN=$(echo $CREDENTIALS | awk '{print $3}')


      - name: Assume Production Account Role
        if: ${{ inputs.provider == 'aws' }}
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ inputs.role_arn }}
          aws-region: ${{ inputs.aws_region }} 
          role-duration-seconds: 900
          role-skip-session-tagging: true


      - name: Login to Amazon ECR
        if: ${{ inputs.provider == 'aws' }}
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Push docker image to Amazon ECR
        if: ${{ inputs.provider == 'aws' }}
        id: docker-build
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          ECR_REPOSITORY: ${{ inputs.ECR_REPOSITORY }}
          IMAGE_TAG: ${{ inputs.IMAGE_TAG }}
          BUILD_PATH: ${{ inputs.BUILD_PATH }}
        working-directory: ${{ inputs.WORKING_DIRECTORY }}
        run: |
          docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG $BUILD_PATH
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG

      - name: Push docker image to Amazon ECR and DOCKERHUB
        if: ${{ inputs.provider == 'DOCKERHUB,aws' }}
        env:
          ## For ECR env variable
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          ECR_REPOSITORY: ${{ inputs.ECR_REPOSITORY }}
          IMAGE_TAG: ${{ inputs.IMAGE_TAG }}
          BUILD_PATH: ${{ inputs.BUILD_PATH }}
          ## For DOCKERHUB env variable
          images: ${{ inputs.images }}
        run: |
          docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG BUILD_PATH
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
          docker build -t $images:$IMAGE_TAG BUILD_PATH
          docker push $images:$IMAGE_TAG
...
