---
name: Automerge

on:
  workflow_call:
    inputs:
      tfcheck:
        description: 'Optional extra check-run name to wait on, appended to `wait_checks`. Kept for backward compatibility; prefer listing all checks in `wait_checks`.'
        required: false
        type: string
      wait_checks:
        description: 'JSON array of required check-run names to wait on before auto-approving. Must match the exact names GitHub reports (including emoji, casing, and parentheses).'
        required: false
        type: string
        default: '["tf-lint / tflint", "tfsec / 🧪 tfsec SARIF Report"]'
      tfchecks_azure:
        description: 'List of Azure TF checks (JSON array as string)'
        required: false
        type: string
        default: '["pr-validation / 📝 Validate PR title", "pr-validation / 🧾 Validate Commit Messages", "tf-lint / tflint"]'
      azure_cloud:
        description: 'Enable Azure-specific checks'
        required: false
        type: boolean
        default: false
    secrets:
      GITHUB:
        description: 'GitHub Token'
        required: false

jobs:
  prep-checks:
    name: Resolve wait_checks
    runs-on: ubuntu-latest
    if: github.actor == 'dependabot[bot]' && !inputs.azure_cloud
    outputs:
      checks: ${{ steps.build.outputs.checks }}
    steps:
      - id: build
        shell: bash
        env:
          BASE: ${{ inputs.wait_checks }}
          EXTRA: ${{ inputs.tfcheck }}
        run: |
          if [ -n "$EXTRA" ]; then
            checks=$(jq -cn --argjson base "$BASE" --arg extra "$EXTRA" '$base + [$extra]')
          else
            checks="$BASE"
          fi
          echo "checks=$checks" >>"$GITHUB_OUTPUT"

  static-checks:
    name: Check Static Analysis
    needs: prep-checks
    runs-on: ubuntu-latest
    strategy:
      matrix:
        tf-checks: ${{ fromJSON(needs.prep-checks.outputs.checks) }}
    if: github.actor == 'dependabot[bot]' && !inputs.azure_cloud
    steps:
      - name: Wait for 2 Minutes
        run: sleep 120s
        shell: bash

      - name: Wait for "${{ matrix.tf-checks }}" to Succeed
        uses: lewagon/wait-on-check-action@v1.5.0
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          check-name: ${{ matrix.tf-checks }}
          repo-token: ${{ secrets.GITHUB || secrets.GITHUB_TOKEN }}
          wait-interval: 30
          allowed-conclusions: success

  static-checks-azure:
    name: Check Static Analysis for Azure
    runs-on: ubuntu-latest
    permissions:
      contents: read
      checks: read
      pull-requests: read
    if: |
      github.actor == 'dependabot[bot]' &&
      inputs.azure_cloud == true &&
      inputs.tfchecks_azure != '[]'
    strategy:
      matrix:
        tf-checks: ${{ fromJSON(inputs.tfchecks_azure) }}
    steps:
      - name: Wait for 2 Minutes
        run: sleep 120s
        shell: bash

      - name: Wait for "${{ matrix.tf-checks }}" to Succeed
        uses: lewagon/wait-on-check-action@v1.5.0
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          check-name: ${{ matrix.tf-checks }}
          repo-token: ${{ secrets.GITHUB || secrets.GITHUB_TOKEN }}
          wait-interval: 30
          allowed-conclusions: success

  autoapprove:
    permissions:
      contents: write
      pull-requests: write
    name: Auto Approve PRs by Dependabot
    needs: [static-checks]
    runs-on: ubuntu-latest
    if: |
      always() &&
      github.actor == 'dependabot[bot]' &&
      (needs.static-checks.result == 'success' || needs.static-checks-azure.result == 'success')  && !inputs.azure_cloud
    steps:
      - name: Approve PR via GitHub Bot
        run: gh pr review --approve "$PR_URL"
        env:
          PR_URL: ${{github.event.pull_request.html_url}}
          GITHUB_TOKEN: ${{secrets.GITHUB_TOKEN}}

      - name: Approve PR via Anmol Nagpal
        run: gh pr review --approve "$PR_URL"
        env:
          PR_URL: ${{github.event.pull_request.html_url}}
          GITHUB_TOKEN: ${{secrets.GITHUB}}

  autoapprove-azure:
    permissions:
      contents: write
      pull-requests: write
    name: Auto Approve PRs by Dependabot
    needs: [static-checks-azure]
    runs-on: ubuntu-latest
    if: |
      always() &&
      github.actor == 'dependabot[bot]' &&
      (needs.static-checks.result == 'success' || needs.static-checks-azure.result == 'success') &&
      inputs.azure_cloud == true
    steps:
      - name: Approve PR via GitHub Bot
        run: gh pr review --approve "$PR_URL"
        env:
          PR_URL: ${{github.event.pull_request.html_url}}
          GITHUB_TOKEN: ${{secrets.GITHUB_TOKEN}}

      - name: Approve PR via Anmol Nagpal
        run: gh pr review --approve "$PR_URL"
        env:
          PR_URL: ${{github.event.pull_request.html_url}}
          GITHUB_TOKEN: ${{secrets.GITHUB}}

  automerge-azure:
    runs-on: ubuntu-latest
    needs: autoapprove-azure
    if: |
      always() &&
      needs.autoapprove-azure.result == 'success' &&
      github.event_name == 'pull_request' &&
      github.event.pull_request.draft == false &&
      inputs.azure_cloud == true
    steps:
      - name: Automerge
        uses: pascalgn/automerge-action@v0.16.4
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB }}
          MERGE_FILTER_AUTHOR: 'dependabot[bot]'
          MERGE_METHOD: "merge"
          MERGE_DELETE_BRANCH: "true"
          MERGE_LABELS: "dependencies"
          MERGE_REQUIRED_APPROVALS: ""
  automerge:
    runs-on: ubuntu-latest
    needs: autoapprove
    if: |
      always() &&
      needs.autoapprove.result == 'success' &&
      github.event_name == 'pull_request' &&
      github.event.pull_request.draft == false && !inputs.azure_cloud
    steps:
      - name: Automerge
        uses: pascalgn/automerge-action@v0.16.4
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB }}
          MERGE_FILTER_AUTHOR: 'dependabot[bot]'
          MERGE_METHOD: "merge"
          MERGE_DELETE_BRANCH: "true"
          MERGE_LABELS: "dependencies, github_actions"
          MERGE_REQUIRED_APPROVALS: ""
...
