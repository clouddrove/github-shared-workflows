---
name: changelog
permissions: write-all
on:
  push: 
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'
  workflow_dispatch:
jobs:
  changelog:
    uses: ./.github/workflows/release-changelog.yml
    with:
      branch: 'master'
      tag_format: vX.Y.Z
      release_tag: ${{ github.ref_name }}
    secrets:
      GITHUB: ${{ secrets.GITHUB }}

  release-major-tag:
    needs: changelog
    if: always()
    uses: ./.github/workflows/release-maintain-major-tag.yml
    with:
      tag_name: ${{ github.ref_name }}
    secrets:
      GITHUB: ${{ secrets.GITHUB }}
...
