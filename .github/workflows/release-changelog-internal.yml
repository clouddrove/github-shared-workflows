---
name: changelog
permissions: write-all
on:
  push: 
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      tag:
        required: true   
        type: string
        description: "Enter the semantic version tag (eg: 3.4.2) for which you want to update the changelog"
jobs:
  call-workflow-changelog:
    uses: ./.github/workflows/release-changelog.yml
    secrets: inherit
    with:
      branch: master
      tag: ${{ inputs.tag || '' }}
...
