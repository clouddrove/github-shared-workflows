name: Slack Notify (CloudDrove Style)

on:
  workflow_call:
    inputs:
      channel:
        type: string
        required: true
        description: 'Slack channel #name (ignored for webhook, channel is fixed in webhook setup)'
      title:
        type: string
        required: true
      status:
        type: string
        required: true
      fields_json:
        type: string
        required: false
        default: '[]'
      body_md:
        type: string
        required: false
        default: ""
      button_text:
        type: string
        required: false
        default: Open Run
      button_url:
        type: string
        required: false
        default: ""
      logo_url:
        type: string
        required: false
        default: https://clouddrove.com/logo.png
      brand:
        type: string
        required: false
        default: CloudDrove
      link_to_run:
        type: boolean
        required: false
        default: true
    secrets:
      SLACK_WEBHOOK_URL:
        required: true

jobs:
  send:
    runs-on: ubuntu-latest
    steps:
      - name: Build payload (Block Kit)
        id: build
        shell: bash
        run: |
          set -e
          STATUS="${{ inputs.status }}"
          TITLE="${{ inputs.title }}"
          BRAND="${{ inputs.brand }}"
          LOGO_URL="${{ inputs.logo_url }}"
          RUN_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          LINK_TO_RUN="${{ inputs.link_to_run }}"
          BODY_MD="${{ inputs.body_md }}"
          BUTTON_TEXT="${{ inputs.button_text }}"
          BUTTON_URL="${{ inputs.button_url }}"
          FIELDS_JSON='${{ inputs.fields_json }}'

          case "${STATUS,,}" in
            success)  EMOJI="✅";;
            failed)   EMOJI="❌";;
            cancelled)EMOJI="⚠️";;
            warning)  EMOJI="⚠️";;
            info|*)   EMOJI="ℹ️";;
          esac

          if [ "$LINK_TO_RUN" = "true" ]; then
            CTX_TEXT="*by $BRAND* • <${RUN_URL}|View GitHub Run>"
          else
            CTX_TEXT="*by $BRAND*"
          fi

          jq -n \
            --arg title "$EMOJI $TITLE — ${STATUS^^}" \
            --arg ctx "$CTX_TEXT" \
            --arg logo "$LOGO_URL" \
            --arg body "$BODY_MD" \
            --arg btn_txt "$BUTTON_TEXT" \
            --arg btn_url "$BUTTON_URL" \
            --argjson fields "$FIELDS_JSON" \
            '{
              blocks: [
                { "type":"header", "text":{"type":"plain_text","text":$title,"emoji":true} },
                { "type":"context", "elements":[
                    { "type":"image", "image_url": $logo, "alt_text": "brand" },
                    { "type":"mrkdwn", "text": $ctx }
                  ]
                },
                ( if $body != "" then { "type":"section", "text": { "type":"mrkdwn", "text": $body } } else empty end ),
                ( if ($fields | length) > 0 then {
                    "type": "section",
                    "fields": ($fields | map({ "type":"mrkdwn", "text": ("*" + .name + "*: " + .value) }))
                  } else empty end ),
                ( if $btn_url != "" then {
                    "type":"actions",
                    "elements":[{ "type":"button","text":{"type":"plain_text","text":$btn_txt},"url":$btn_url,"style":"primary"}]
                  } else empty end )
              ]
            }' > payload.json

      - name: Send to Slack (via Webhook)
        run: |
          curl -X POST -H 'Content-type: application/json' \
            --data @payload.json \
            ${{ secrets.SLACK_WEBHOOK_URL }}
