---
name: '🔍 PR Validation'
on:
  workflow_call:
    inputs:
      types:
        required: false
        type: string
        default: |
          fix
          feat
          docs
          ci
          chore
          test
          refactor
          style
          perf
          build
          revert
      requireScope:
        required: false
        type: boolean
        default: false
      subjectPattern:
        required: false
        type: string
        default: '^[A-Z].+$'
      validateSingleCommit:
        required: false
        type: boolean
        default: false
      checkLabels:
        required: false
        type: boolean
        default: true

jobs:
  validate-title:
    name: 📝 Validate PR title
    runs-on: ubuntu-latest
    steps:
      # - uses: amannn/action-semantic-pull-request@v6.1.1
      #   env:
      #     GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      #   with:
      #     types: ${{ inputs.types }}
      #     requireScope: ${{ inputs.requireScope }}
      #     subjectPattern: ${{ inputs.subjectPattern }}
      #     subjectPatternError: |
      #       The subject "{subject}" found in the pull request title "{title}"
      #       didn't match the configured pattern. Please ensure that the subject
      #       starts with an uppercase character.
      #     wip: true
      #     validateSingleCommit: ${{ inputs.validateSingleCommit }}

      - name: Validate PR title format
        run: |
          TITLE="${{ github.event.pull_request.title }}"

          echo "PR Title: $TITLE"

          PATTERN="^(feat|fix|docs|style|refactor|test|chore|build|ci|perf|revert)(\([a-zA-Z0-9_-]+\))?: .+"

          if [[ ! "$TITLE" =~ $PATTERN ]]; then
            echo "::error::PR title does not follow Conventional Commits format."
            echo "Valid examples:"
            echo "  feat: Add login API"
            echo "  fix(auth): Resolve token issue"
            exit 1
          fi

          echo "PR title validation passed."

      - name: 🏷️ Check PR labels
        if: ${{ inputs.checkLabels && github.event.pull_request.head.repo.fork == false }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ -z "$(gh api repos/$GITHUB_REPOSITORY/issues/${{ github.event.pull_request.number }}/labels --jq '.[].name')" ]; then
            echo "::error::No labels found on this PR. Please add at least one label."
            exit 1
          else
            echo "PR has labels, validation passed."
          fi

  validate-commits:
    name: 🧾 Validate Commit Messages
    runs-on: ubuntu-latest
    steps:
      - name: 📦 Checkout Repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: 🧾 Commitlint Validation (Inline Config)
        uses: wagoid/commitlint-github-action@v6
        with:
          configFile: commitlint.config.cjs
... 
