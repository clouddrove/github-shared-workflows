---
name: '🔍 PR Validation'
on:
  workflow_call:
    inputs:
      types:
        required: false
        type: string
        default: |
          fix
          feat
          docs
          ci
          chore
          test
          refactor
          style
          perf
          build
          revert
      requireScope:
        required: false
        type: boolean
        default: false
      subjectPattern:
        required: false
        type: string
        default: '^[A-Za-z].+$'
      validateSingleCommit:
        required: false
        type: boolean
        default: false
      checkLabels:
        required: false
        type: boolean
        default: true

jobs:
  validate-title:
    name: 📝 Validate PR title
    runs-on: ubuntu-latest
    steps:
      - name: Validate PR title format
        run: |
          TITLE="${{ github.event.pull_request.title }}"

          echo "PR Title: $TITLE"

          TYPES=$(echo "${{ inputs.types }}" | tr '\n' '|' | sed 's/|$//')

          if [ "${{ inputs.requireScope }}" = "true" ]; then
            PATTERN="^(${TYPES}|$(echo ${TYPES} | sed 's/\([^|]*\)/\u\1|\l\1/g'))(\([a-zA-Z0-9_-]+\)): ${{ inputs.subjectPattern }}"
          else
            PATTERN="^(${TYPES}|$(echo ${TYPES} | sed 's/\([^|]*\)/\u\1|\l\1/g'))(\([a-zA-Z0-9_-]+\))?: ${{ inputs.subjectPattern }}"
          fi

          if [[ ! "$TITLE" =~ $PATTERN ]]; then
            echo "::error::PR title does not follow Conventional Commits format."
            echo "Valid examples:"
            echo "  feat: Add login API"
            echo "  Feat: Add login API"
            echo "  fix(auth): Resolve token issue"
            echo "  Fix(auth): Resolve token issue"
            echo "  docs: Update README"
            echo "  Docs(readme): Update README formatting"
            echo "  chore: Update dependencies"
            echo "  Chore(ci): Update CI pipeline"
            echo "  refactor(core): Simplify authentication logic"
            echo "  Refactor(core): Simplify authentication logic"
            exit 1
          fi

          echo "PR title validation passed."

      - name: 🏷️ Check PR labels
        if: ${{ inputs.checkLabels && github.event.pull_request.head.repo.fork == false }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ -z "$(gh api repos/$GITHUB_REPOSITORY/issues/${{ github.event.pull_request.number }}/labels --jq '.[].name')" ]; then
            echo "::error::No labels found on this PR. Please add at least one label."
            exit 1
          else
            echo "PR has labels, validation passed."
          fi

  validate-commits:
    name: 🧾 Validate Commit Messages
    runs-on: ubuntu-latest
    steps:
      - name: 📦 Checkout Repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: 🔢 Validate single commit
        if: ${{ inputs.validateSingleCommit }}
        run: |
          COUNT=$(git rev-list --count origin/${{ github.base_ref }}..HEAD)
          echo "Commit count in PR: $COUNT"

          if [ "$COUNT" -ne 1 ]; then
            echo "::error::This PR must contain exactly one commit."
            exit 1
          fi

      - name: 🧾 Commitlint Validation (Inline Config)
        uses: wagoid/commitlint-github-action@v6
        with:
          configFile: commitlint.config.cjs
...